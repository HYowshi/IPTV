<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truyền hình - Phim.tv</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="truyenhinh.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
</head>
<body>
    <div class="tv-app">
        <aside class="tv-sidebar">
            <div class="sidebar-top">
                <a href="../index.html" class="sidebar-item">
                    <span class="material-symbols-rounded">home</span>
                    <span class="sidebar-text">Trang chủ</span>
                </a>
                <a href="#" class="sidebar-item active">
                    <span class="material-symbols-rounded">tv</span>
                    <span class="sidebar-text">Truyền hình</span>
                </a>
                <a href="../phim/phim.html" class="sidebar-item">
                    <span class="material-symbols-rounded">movie</span>
                    <span class="sidebar-text">Phim Ảnh</span>
                </a>
            </div>
            <div class="sidebar-bottom">
                <a href="#" class="sidebar-item">
                    <span class="material-symbols-rounded">settings</span>
                    <span class="sidebar-text">Cài đặt</span>
                </a>
            </div>
        </aside>

        <main class="tv-main">
            <header class="tv-header">
                <div class="tv-logo">
                    <span class="material-symbols-rounded" style="color: #00f2fe; margin-right: 5px;">tv</span> TRUYỀN HÌNH<span style="color: #00f2fe;">.TV</span>
                </div>
                <div class="tv-header-right">
                    <div class="tv-search" id="tv-search-container">
                        <span class="material-symbols-rounded">search</span>
                        <input type="text" id="tv-search-input" placeholder="Tìm kiếm kênh...">
                    </div>
                    <div class="tv-clock" id="tv-clock">00:00</div>
                    <div class="tv-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=00f2fe&color=fff" alt="Profile">
                    </div>
                </div>
            </header>

            <section class="tv-hero" id="tv-hero">
                <div class="hero-backdrop" id="hero-backdrop"></div>
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <div class="hero-badge" id="hero-category">KÊNH QUỐC GIA</div>
                    <h1 id="hero-title">VTV3 HD</h1>
                    <p id="hero-desc">Kênh truyền hình giải trí tổng hợp Đài Truyền hình Việt Nam. Phát sóng các chương trình gameshow, phim truyện, thể thao đặc sắc.</p>
                    <div class="hero-actions" style="display: flex; gap: 15px;">
                        <button class="btn-watch" id="btn-watch-channel">
                            <span class="material-symbols-rounded">play_arrow</span> Xem Kênh Này
                        </button>
                        <button class="btn-watch" id="btn-favorite-channel" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
                            <span class="material-symbols-rounded">favorite</span> Yêu Thích
                        </button>
                    </div>
                </div>
            </section>

            <section class="tv-channels-container" id="channels-container">
            </section>

            <div id="watch-view" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999;">
                <div id="top-controls" class="top-controls" style="position: absolute; top: 30px; left: 30px; z-index: 10000; display: flex; gap: 15px;">
                    <button id="btn-back-tv" style="padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 16px; backdrop-filter: blur(10px); transition: all 0.3s; display: flex; align-items: center; gap: 8px;">
                        <span class="material-symbols-rounded">arrow_back</span> Quay lại danh sách
                    </button>
                    <select id="tv-quality-selector" style="display: none; padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 16px; backdrop-filter: blur(10px); outline: none;">
                        <option value="-1" style="background: #111;">Tự động</option>
                    </select>
                </div>
                <div id="tv-osd" class="tv-osd">
                    <img id="tv-osd-logo" src="" alt="Logo">
                    <div class="tv-osd-info">
                        <h2 id="tv-osd-name"></h2>
                        <p id="tv-osd-now"></p>
                    </div>
                </div>
                <div id="tv-loader" class="tv-loader-overlay">
                    <div class="tv-spinner"></div>
                </div>
                <video id="tv-player" autoplay style="width: 100%; height: 100%; outline: none;"></video>
                
                <div id="quick-channel-sidebar" class="quick-sidebar">
                    <div class="quick-sidebar-title">Danh sách kênh</div>
                    <div id="quick-channel-list" class="quick-list-content"></div>
                </div>

                <div id="tv-custom-controls" class="tv-controls">
                    <div class="controls-left">
                        <button id="btn-play-pause" class="control-btn"><span class="material-symbols-rounded">pause</span></button>
                        <button id="btn-mute" class="control-btn"><span class="material-symbols-rounded">volume_up</span></button>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>
                    <div class="controls-right">
                        <button id="btn-fullscreen" class="control-btn"><span class="material-symbols-rounded">fullscreen</span></button>
                    </div>
                </div>
            </div>

        </main>
    </div>
    
    <script src="truyenhinh.js"></script>
</body>
</html>

name: Build Multi-Platform (APK & EXE)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Init Tauri Android
        run: npm run tauri android init

      - name: Generate Signing Keystore
        run: |
          keytool -genkeypair -v \
            -keystore phimtv-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias phimtv \
            -storepass phimtv2026 -keypass phimtv2026 \
            -dname "CN=PhimTV, OU=App, O=PhimTV, L=HCM, ST=VN, C=VN"

      - name: Build Tauri APK (release)
        run: npm run tauri android build --release

      - name: Sign APK
        run: |
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED="$APK_DIR/app-universal-release-unsigned.apk"
          ALIGNED="$APK_DIR/app-universal-release-aligned.apk"
          SIGNED="$APK_DIR/PhimTV-v${{ steps.version.outputs.version }}.apk"
          if [ -f "$UNSIGNED" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            echo "Using build-tools: $BUILD_TOOLS"
            "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
            "$BUILD_TOOLS/apksigner" sign \
              --ks phimtv-release.jks \
              --ks-pass pass:phimtv2026 \
              --ks-key-alias phimtv \
              --key-pass pass:phimtv2026 \
              --out "$SIGNED" \
              "$ALIGNED"
            "$BUILD_TOOLS/apksigner" verify "$SIGNED"
            echo "✅ Signed APK: $SIGNED"
            ls -lh "$SIGNED"
          else
            echo "❌ APK not found at $UNSIGNED"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Android-v${{ steps.version.outputs.version }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/PhimTV-v${{ steps.version.outputs.version }}.apk

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** PhimTV-Android-v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "📦 Building version: $version"
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri Windows
        run: npm run tauri build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Windows-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ Windows Build Successful" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Artifact:** PhimTV-Windows-v${{ steps.version.outputs.version }}" >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh
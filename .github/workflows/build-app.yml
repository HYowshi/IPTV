name: Build Multi-Platform (APK & EXE)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --list | grep ndk
          sdkmanager "ndk;28.0.13004108" || true
          NDK_VERSION=$(ls $ANDROID_HOME/ndk/ | sort -V | tail -1)
          echo "NDK_VERSION=$NDK_VERSION" >> $GITHUB_ENV
          echo "Using NDK: $NDK_VERSION"

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo "Skip icon generation"

      - name: Init Tauri Android
        run: npx tauri android init

      - name: Restore Signing Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Restoring keystore from GitHub secret..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/phimtv-release.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not found, generating debug keystore"
            keytool -genkeypair -v -keystore src-tauri/gen/android/phimtv-release.jks \
              -keyalg RSA -keysize 2048 -validity 10000 -alias phimtv \
              -storepass phimtv2026 -keypass phimtv2026 \
              -dname "CN=PhimTV, OU=App, O=PhimTV, L=HCM, ST=VN, C=VN"
          fi

      - name: Build Tauri APK (release)
        run: npx tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Zipalign and Sign APK
        run: |
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED="$APK_DIR/app-universal-release-unsigned.apk"
          ALIGNED="$APK_DIR/app-universal-release-aligned.apk"
          SIGNED="$APK_DIR/PhimTV-v${{ steps.version.outputs.version }}.apk"
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)

          if [ -f "$UNSIGNED" ]; then
            echo "Step 1: Zipalign APK..."
            "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"

            echo "Step 2: Signing APK..."
            "$BUILD_TOOLS/apksigner" sign \
              --ks src-tauri/gen/android/phimtv-release.jks \
              --ks-pass pass:phimtv2026 \
              --ks-key-alias phimtv \
              --key-pass pass:phimtv2026 \
              --out "$SIGNED" \
              "$ALIGNED"

            echo "Verifying signature..."
            "$BUILD_TOOLS/apksigner" verify -v "$SIGNED" || true
            echo "Signed APK: $SIGNED"
            ls -lh "$SIGNED"
          else
            echo "Unsigned APK not found at $UNSIGNED"
            ls -la "$APK_DIR/" || true
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Android-v${{ steps.version.outputs.version }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/PhimTV-v${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "## Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name:** Phim.tv" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** com.phimtv.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo Skip

      - name: Restore Signing Certificate
        run: |
          if ("${{ secrets.WINDOWS_CERT_BASE64 }}" -ne "") {
            [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}") | Set-Content -Path "signing.pfx" -Encoding Byte
            echo "Certificate restored"
          } else {
            echo "WINDOWS_CERT_BASE64 secret not found, skipping signing"
          }
        shell: pwsh

      - name: Build Tauri Windows
        run: npx tauri build

      - name: Sign Windows EXE
        run: |
          if (Test-Path "signing.pfx") {
            $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) {
              $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2("signing.pfx", "PhimTV2026Sign!")
              Set-AuthenticodeSignature -FilePath $exe.FullName -Certificate $cert -HashAlgorithm SHA256 -TimestampServer "http://timestamp.digicert.com"
              Write-Host "Signed: $($exe.Name)"
            }
          } else {
            Write-Host "No certificate, skipping signing"
          }
        shell: pwsh

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Windows-v${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Build Summary
        if: success()
        run: |
          echo "## Windows Build Successful" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh
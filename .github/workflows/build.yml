name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
            artifact: PhimTV-Windows
          - platform: ubuntu-22.04
            target: linux
            artifact: PhimTV-Linux
          - platform: macos-latest
            target: macos
            artifact: PhimTV-macOS

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo "Skip icon generation"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Phim.tv ${{ github.ref_name }}'
          releaseBody: |
            ## Phim.tv v${{ steps.version.outputs.version }}
            
            ### Tai ve phien ban moi nhat
            - **Windows**: File `.exe` (NSIS installer)
            - **Linux**: File `.AppImage` hoac `.deb`
            - **macOS**: File `.dmg`
            
            ### Thong tin
            - Trang chu: https://phimtv.app
            - Bao loi: https://github.com/HYowshi/IPTV/issues
          releaseDraft: false
          prerelease: false

      - name: Build Summary
        if: success()
        run: |
          echo "## ${{ matrix.artifact }} Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY

  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo "Skip icon generation"

      - name: Init Tauri Android
        run: npx tauri android init

      - name: Restore Signing Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/phimtv-release.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not found, generating debug keystore"
            keytool -genkeypair -v -keystore src-tauri/gen/android/phimtv-release.jks \
              -keyalg RSA -keysize 2048 -validity 10000 -alias phimtv \
              -storepass phimtv2026 -keypass phimtv2026 \
              -dname "CN=PhimTV, OU=App, O=PhimTV, L=HCM, ST=VN, C=VN"
          fi

      - name: Build Android APK
        run: npx tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Android-v${{ steps.version.outputs.version }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "## PhimTV Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** com.phimtv.phimtvapp" >> $GITHUB_STEP_SUMMARY
          echo "- **Min SDK:** 24 (Android 7.0)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures:** arm64, armv7, x86, x86_64" >> $GITHUB_STEP_SUMMARY
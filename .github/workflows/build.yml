name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
            ext: .exe
          - platform: ubuntu-22.04
            target: linux
            ext: .AppImage
          - platform: macos-latest
            target: macos
            ext: .dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: phimtvapp
        run: npm ci

      - name: Generate icons
        working-directory: phimtvapp
        run: python generate-icons.py || echo "Icons already exist, skipping..."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: phimtvapp
          tagName: ${{ github.ref_name }}
          releaseName: 'Phim.tv ${{ github.ref_name }}'
          releaseBody: 'Tải về phiên bản mới nhất của Phim.tv'
          releaseDraft: false
          prerelease: false
          args: '--target ${{ matrix.target }}'

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Android targets
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: phimtvapp
        run: npm ci

      - name: Install Tauri CLI
        working-directory: phimtvapp
        run: npm install @tauri-apps/cli

      - name: Generate icons
        working-directory: phimtvapp
        run: python generate-icons.py || echo "Icons already exist, skipping..."

      - name: Build Android APK
        working-directory: phimtvapp
        run: npx tauri android init --ci && npx tauri android build --target aarch64 --split-per-abi
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            phimtvapp/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            phimtvapp/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: phimtvapp/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
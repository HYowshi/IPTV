name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
            artifact: PhimTV-Windows
          - platform: ubuntu-22.04
            target: linux
            artifact: PhimTV-Linux
          - platform: macos-latest
            target: macos
            artifact: PhimTV-macOS

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo "Skip icon generation"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Generate changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          # Save to file for multiline output
          echo "$CHANGES" > /tmp/changelog.txt
          echo "Generated changelog"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Phim.tv ${{ github.ref_name }}'
          releaseBody: |
            <div align="center">
            
            ## 🎬 Phim.tv ${{ github.ref_name }}
            
            **Giai Tri Da Phuong Tien — Xem Phim & Truyen Hinh HD**
            
            ---
            
            </div>

            ### 📥 Tai ve

            | Platform | File | Ghi chu |
            |----------|------|---------|
            | Windows | `.exe` (NSIS) | Windows 10+ |
            | Linux | `.AppImage` / `.deb` | Ubuntu 22.04+ |
            | macOS | `.dmg` | macOS 12+ |
            | Android | `.apk` | Android 7.0+ (API 24) |

            ### 🔄 Phien ban v${{ steps.version.outputs.version }}

            - Xem phim truc tuyen tu ophim API
            - 240+ kenh truyen hinh Viet Nam
            - Watch Party (xem nhom qua PeerJS)
            - Responsive: Desktop, Tablet, Mobile
            - NSIS installer voi branding tuy chinh
            - Auto-update IPTV playlists (daily)

            ### 🛠️ Cai dat tu source
            ```bash
            git clone https://github.com/HYowshi/IPTV.git
            cd IPTV
            npm install
            npm run tauri dev
            ```

            ### 🐛 Bao loi
            [Mo issue tren GitHub](https://github.com/HYowshi/IPTV/issues)

            ---
            <div align="center">
            <sub>Phim.tv © 2026 PhimTV Admin | Made with ❤️ in Vietnam</sub>
            </div>
          releaseDraft: false
          prerelease: false

      - name: Build Summary
        if: success()
        run: |
          echo "## ${{ matrix.artifact }} Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY

  build-android:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: android-ubuntu24

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26.1
        run: |
          # Remove pre-installed NDKs that conflict
          sudo rm -rf $ANDROID_HOME/ndk/2*.0.*
          sdkmanager --install "ndk;26.1.10909125"
          NDK_PATH="$ANDROID_HOME/ndk/26.1.10909125"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "CARGO_NDK_ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          ls -la $ANDROID_HOME/ndk/
          echo "Using NDK: $NDK_PATH"

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate icons
        run: python generate-icons.py || pip install Pillow && python generate-icons.py || echo "Skip icon generation"

      - name: Init Tauri Android
        run: |
          npx tauri android init
          python generate-icons.py --force

      - name: Restore Signing Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/phimtv-release.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not found, generating debug keystore"
            keytool -genkeypair -v -keystore src-tauri/gen/android/phimtv-release.jks \
              -keyalg RSA -keysize 2048 -validity 10000 -alias phimtv \
              -storepass phimtv2026 -keypass phimtv2026 \
              -dname "CN=PhimTV, OU=App, O=PhimTV, L=HCM, ST=VN, C=VN"
          fi

      - name: Build Android APK
        run: npx tauri android build
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          CARGO_NDK_ANDROID_NDK_HOME: ${{ env.CARGO_NDK_ANDROID_NDK_HOME }}

      - name: Zipalign and Sign APK
        run: |
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          UNSIGNED="$APK_DIR/app-universal-release-unsigned.apk"
          ALIGNED="$APK_DIR/app-universal-release-aligned.apk"
          SIGNED="$APK_DIR/PhimTV-v${{ steps.version.outputs.version }}.apk"
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)

          if [ ! -f "$UNSIGNED" ]; then
            echo "Unsigned APK not found at $UNSIGNED"
            find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" -print || true
            exit 1
          fi

          echo "Zipalign APK..."
          "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"

          echo "Sign APK..."
          "$BUILD_TOOLS/apksigner" sign \
            --ks src-tauri/gen/android/phimtv-release.jks \
            --ks-pass pass:phimtv2026 \
            --ks-key-alias phimtv \
            --key-pass pass:phimtv2026 \
            --out "$SIGNED" \
            "$ALIGNED"

          echo "Verify APK signature..."
          "$BUILD_TOOLS/apksigner" verify -v "$SIGNED"
          ls -lh "$SIGNED"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhimTV-Android-v${{ steps.version.outputs.version }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/PhimTV-v${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "## PhimTV Android Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** com.phimtv.phimtvapp" >> $GITHUB_STEP_SUMMARY
          echo "- **Min SDK:** 24 (Android 7.0)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures:** arm64, armv7, x86, x86_64" >> $GITHUB_STEP_SUMMARY

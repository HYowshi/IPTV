name: Auto Update IPTV

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp pytz tqdm

      - name: Run Xtream Fetcher
        run: python Xtreamlist2M3u.py

      - name: Run M3U Processor
        run: python M3U_list.py

      - name: Run Sorter
        run: python VTV_sort.py

      - name: Cleanup Intermediate Files
        run: rm -f Sports_Playlist.m3u output.m3u

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Vietnam_HBO_Final.m3u
          git commit -m "Auto-update IPTV playlist" || exit 0
          git push

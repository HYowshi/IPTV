name: Tự động cập nhật IPTV Việt Nam

# 1. Lịch trình chạy
on:
  schedule:
    # Chạy vào lúc 00:00 giờ VN (tương đương 17:00 UTC) hàng ngày
    - cron: '0 17 * * *'
  # Cho phép chạy thủ công bằng nút "Run workflow"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 2: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout code
        uses: actions/checkout@v3

      # Bước 3: Thiết lập Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Bước 4: Cài đặt các thư viện cần thiết
      - name: Install dependencies
        run: |
          pip install requests aiohttp pytz tqdm

      # Bước 5: Chạy quy trình xử lý kênh
      # Thứ tự: Cào Xtream -> Lọc VN/HBO -> Dọn dẹp & Sắp xếp
      - name: Run IPTV Scripts
        run: |
          # 1. Lấy kênh từ server Xtream (Nếu bạn dùng file này)
          python Xtreamlist2M3u_backup2.py || echo "Tiếp tục bước sau..."
          
          # 2. Lọc kênh Việt Nam & HBO và sắp xếp
          # Lưu ý: Thay tên file bằng file lọc tôi đã viết cho bạn
          python M3U_list_VN.py

      # Bước 6: Lưu kết quả và đẩy lên GitHub
      - name: Commit and Push changes
        run: |
          git config --global user.name 'IPTV-Bot'
          git config --global user.email 'bot@github.com'
          # Thay 'Vietnam_HBO_Only.m3u' bằng tên file đầu ra của bạn
          git add Vietnam_HBO_Only.m3u
          git commit -m "Cập nhật danh sách kênh VN & HBO mới nhất: $(date)" || echo "Không có thay đổi"
          git push

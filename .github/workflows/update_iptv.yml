name: Tự động cập nhật IPTV

# 1. Cài đặt thời gian chạy
on:
  schedule:
    # Chạy tự động vào lúc 0:00 (UTC) mỗi ngày. Bạn có thể đổi giờ nếu muốn.
    - cron: '0 0 * * *'
  # Cho phép bạn có thể bấm nút "Run workflow" để chạy thủ công bất cứ lúc nào
  workflow_dispatch:

# 2. Các bước thực hiện
jobs:
  update-playlist:
    runs-on: ubuntu-latest # Chạy trên máy chủ ảo hệ điều hành Ubuntu

    steps:
      # Bước 2.1: Lấy mã nguồn của bạn về máy chủ ảo
      - name: Lấy mã nguồn
        uses: actions/checkout@v3

      # Bước 2.2: Cài đặt môi trường Python
      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Bước 2.3: Cài đặt các thư viện phụ thuộc (M3U_list.py cần thư viện 'requests')
      - name: Cài đặt thư viện
        run: |
          pip install requests

      # Bước 2.4: Chạy tệp Python của bạn
      - name: Chạy mã nguồn M3U_list.py
        run: python M3U_list.py

      # Bước 2.5: Lưu (commit) tệp output.m3u mới và đẩy (push) ngược lại lên GitHub
      - name: Lưu và đẩy kết quả lên GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add output.m3u
          # Nếu có thay đổi thì lưu lại, nếu không có thay đổi thì bỏ qua để tránh lỗi
          git commit -m "Tự động cập nhật danh sách kênh mới" || echo "Không có cập nhật mới"
          git push
